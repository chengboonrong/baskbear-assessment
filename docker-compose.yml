# Local dev infra for the Baskbear assessment.
# Production runs Aurora MySQL + ElastiCache Redis (see docs/architecture.md).
services:
  mysql:
    image: mysql:8.0
    container_name: baskbear-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: baskbear
      MYSQL_DATABASE: baskbear
      MYSQL_USER: baskbear
      MYSQL_PASSWORD: baskbear
    ports:
      - "3307:3306"          # host:container — host=3307 to avoid clashing with native MySQL on 3306
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pbaskbear"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: baskbear-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: baskbear-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # In-network MySQL uses the service name + internal port (3306), not the
      # host-mapped 3307. The local .env still points at localhost:3307 for
      # devs running `npm run start:dev` against this same compose stack.
      DATABASE_URL: "mysql://baskbear:baskbear@mysql:3306/baskbear"
      PORT: "3000"
      NODE_ENV: production
      LOG_LEVEL: info
      COGNITO_REGION: ap-southeast-1
      COGNITO_USER_POOL_ID: ap-southeast-1_xxxxxxx
      COGNITO_APP_CLIENT_ID: xxxxxxxxxxxxxxxxxxxxxxxxxx
      COGNITO_ALLOWED_AUDIENCES: ""
      DEV_AUTH_BYPASS: "true"
      DEV_DEFAULT_SUB: demo-user-sub
      DEFAULT_COUNTRY_CODE: MY
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  mysql_data:
